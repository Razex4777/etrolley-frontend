<section class="contact" id="contact">
  <div class="contact__inner">
    <div class="contact__header">
      <div class="contact__header-title-box">
        <h2 class="contact__header-title">ابق على تواصل</h2>
      </div>
      <div class="contact__header-desc-box">
        <p class="contact__header-desc">
          تم تصميم منصتنا لتبسيط عملية إنشاء متجر إلكتروني أو تطبيق، مما يتيح لك التركيز على ما تفعله بشكل أفضل - بيع منتجاتك وخدماتك.
        </p>
      </div>
    </div>
    
    <span class="contact__divider" aria-hidden="true"></span>

    <div class="contact__content">
      <form class="contact__form" action="#" method="POST" onsubmit="event.preventDefault(); alert('تم إرسال الرسالة بنجاح!');">
        <div class="contact__field">
          <label for="form-name-ar" class="contact__field-label">الاسم</label>
          <input type="text" id="form-name-ar" class="contact__field-input" placeholder="اكتب اسمك هنا" required />
        </div>
        <div class="contact__field">
          <label for="form-email-ar" class="contact__field-label">البريد الإلكتروني</label>
          <input type="email" id="form-email-ar" class="contact__field-input" placeholder="اكتب بريدك الإلكتروني" required />
        </div>
        <div class="contact__field">
          <label for="form-phone-ar" class="contact__field-label">رقم الهاتف</label>
          <input type="tel" id="form-phone-ar" class="contact__field-input" placeholder="اكتب رقم هاتفك" required />
        </div>
        <div class="contact__field contact__field--textarea">
          <label for="form-message-ar" class="contact__field-label">الرسالة هنا..</label>
          <textarea id="form-message-ar" class="contact__field-textarea" placeholder="اكتب رسالتك هنا..." required></textarea>
        </div>
        <button type="submit" class="contact__submit-btn">إرسال الرسالة</button>
      </form>
      
      <div class="contact__image-box">
        <img class="contact__image" src="/images/contact-illustration.webp" alt="تواصل معنا" loading="lazy" />
      </div>
    </div>
  </div>
</section>
