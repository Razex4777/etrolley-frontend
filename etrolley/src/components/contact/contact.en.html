<section class="contact" id="contact">
  <div class="contact__inner">
    <div class="contact__header">
      <div class="contact__header-title-box">
        <h2 class="contact__header-title">KEEP IN TOUCH</h2>
      </div>
      <div class="contact__header-desc-box">
        <p class="contact__header-desc">
          Our platform is designed to simplify the process of creating an online store or app, allowing you to focus on what you do best—selling your products and services.
        </p>
      </div>
    </div>
    
    <span class="contact__divider" aria-hidden="true"></span>

    <div class="contact__content">
      <form class="contact__form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sent!');">
        <div class="contact__field">
          <label for="form-name" class="contact__field-label">Name</label>
          <input type="text" id="form-name" class="contact__field-input" placeholder="Type your name" required />
        </div>
        <div class="contact__field">
          <label for="form-email" class="contact__field-label">Email</label>
          <input type="email" id="form-email" class="contact__field-input" placeholder="Type your email" required />
        </div>
        <div class="contact__field">
          <label for="form-phone" class="contact__field-label">Phone Number</label>
          <input type="tel" id="form-phone" class="contact__field-input" placeholder="Type your phone number" required />
        </div>
        <div class="contact__field contact__field--textarea">
          <label for="form-message" class="contact__field-label">Message Here..</label>
          <textarea id="form-message" class="contact__field-textarea" placeholder="Type your message" required></textarea>
        </div>
        <button type="submit" class="contact__submit-btn">Send Message</button>
      </form>
      
      <div class="contact__image-box">
        <img class="contact__image" src="/images/contact-illustration.webp" alt="Contact illustration" loading="lazy" />
      </div>
    </div>
  </div>
</section>
