<section class="createstore is-register-page" id="createstore-section">
  <div class="createstore__inner">
    <div class="createstore__left">
      <h1 class="createstore__title">التسجيل</h1>

      <form class="createstore__form" id="register-form" action="create-store-final" method="POST">
        <div class="createstore__register-grid">
          <!-- Right Col (Mirrored) -->
          <div class="createstore__register-col">
            <div class="createstore__field">
              <input type="text" name="owner_name" placeholder="اسم صاحب المتجر*" required />
            </div>
            <div class="createstore__field">
              <input type="text" name="store_name_ar" placeholder="اسم المتجر بالعربية" />
            </div>
            <div class="createstore__field">
              <input type="text" name="store_name_en" placeholder="اسم المتجر بالإنجليزية" />
            </div>
          </div>

          <!-- Left Col (Mirrored) -->
          <div class="createstore__register-col">
            <div class="createstore__field createstore__field--select" id="store-type-dropdown">
              <button type="button" class="createstore__select-btn" aria-haspopup="listbox" aria-expanded="false">
                <span id="selected-store-type">اختر نوع المتجر *</span>
                <svg class="createstore__arrow" width="15" height="17" viewBox="0 0 15 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1.5 6L7.5 12L13.5 6" stroke="#555555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
              <ul class="createstore__select-list" role="listbox">
                <li class="createstore__select-option" role="option" data-value="retail">تجزئة</li>
                <li class="createstore__select-option" role="option" data-value="restaurant">مطعم / مقهى</li>
                <li class="createstore__select-option" role="option" data-value="services">خدمات</li>
                <li class="createstore__select-option" role="option" data-value="other">أخرى</li>
              </ul>
              <input type="hidden" name="store_type" id="store-type-val" required />
            </div>
            <div class="createstore__field">
              <input type="password" name="password" placeholder="كلمة المرور*" required />
            </div>
            <div class="createstore__field">
              <input type="password" name="confirm_password" placeholder="تأكيد كلمة المرور*" required />
            </div>
          </div>
        </div>

        <!-- Bottom Slug block (Aligned with columns: link on right, input on left in RTL) -->
        <div class="createstore__slug-block">
          <div class="createstore__slug-row">
            <div class="createstore__domain-link-wrapper">
              <a href="https://etrolley.net/store" target="_blank" class="createstore__domain-link">https://etrolley.net/store</a>
            </div>
            <div class="createstore__field createstore__field--slug">
              <input type="text" name="slug" id="store-slug-input" placeholder="رابط المتجر*" required />
            </div>
          </div>
          <div class="createstore__slug-hint-row">
            <div class="createstore__slug-hint-spacer"></div>
            <div class="createstore__slug-hint">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0.75 0.75H16.75V14.75C16.75 15.2804 16.5393 15.7891 16.1642 16.1642C15.7891 16.5393 15.2804 16.75 14.75 16.75H2.75C2.21957 16.75 1.71086 16.5393 1.33579 16.1642C0.960714 15.7891 0.75 15.2804 0.75 14.75V0.75Z" stroke="#9AB5AD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8.75 12.749H8.76V12.759H8.75V12.749Z" stroke="#9AB5AD" stroke-width="2.25" stroke-linejoin="round"/>
                <path d="M8.75 8.74902V4.74902" stroke="#9AB5AD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>اكتب اسم متجرك بدون نقطة أو فاصلة مثال: happy store</span>
            </div>
          </div>
        </div>

        <button type="submit" class="createstore__submit-btn">
          متابعة <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
      </form>
    </div>
  </div>
</section>
